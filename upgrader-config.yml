dotnet-upgrader:
  commit-message: "chore: upgrade .NET from {source} to {target} ({count} project(s) updated)"
  required-qualifications: []
  source-framework: "net8.0"
  target-framework: "net10.0"

  package-upgrades:
    - pattern: "Microsoft.Extensions.*"
      version: "10.0.0"
    - pattern: "System.*"
      version: "10.0.0"

  package-upgrade-exclusions:
    - "Microsoft.Extensions.SomeExcluded"

  package-removals:
    - "SomeObsoletePackage"

  code-removals:
    - pattern: "// TODO: remove for net10"
      file-glob: "**/*.cs"
      is-regex: false

  yaml-replacements:
    - pattern: "net8\\.0"
      replacement: "net10.0"
      file-glob: "**/*.yml"
      is-regex: true

  dockerfile-replacements:
    - pattern: "mcr\\.microsoft\\.com/dotnet/sdk:8\\.0"
      replacement: "mcr.microsoft.com/dotnet/sdk:10.0"
      file-glob: "Dockerfile"
      is-regex: true
